{% with url_name=request.resolver_match.url_name section=request.GET.section|default:'' %}
<div class="card shadow-sm border-0 sticky-lg-top" style="top: 1rem;">
    <div class="card-body p-3">
        <div class="section-kicker mb-2">Panel</div>
        <h1 class="h5 fw-bold mb-3">Opciones</h1>
        <div class="list-group list-group-flush">
            <a href="{% url 'app_users:dashboard' %}" class="list-group-item list-group-item-action {% if url_name == 'dashboard' and section != 'products' %}active{% endif %}">Perfil</a>
            {% if user.is_superuser or user.occupation == '0' %}
            <a href="{% url 'app_users:dashboard' %}?section=products" class="list-group-item list-group-item-action {% if section == 'products' %}active{% endif %}">Productos</a>
            {% endif %}
        </div>
        <div class="d-grid gap-2 mt-3">
            <a href="{% url 'app_home:index' %}" class="btn btn-outline-primary">Inicio</a>
            <a href="{% url 'app_users:logout' %}" class="btn btn-outline-danger">Salir</a>
        </div>
    </div>
</div>
{% endwith %}
