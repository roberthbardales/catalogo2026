<header class="bg-white border-bottom shadow-sm">
    <nav class="navbar navbar-expand-lg navbar-light py-3">
        <div class="container">
            <div class="d-flex align-items-center w-100">
                <a class="navbar-brand d-flex align-items-center gap-2 fw-bold flex-shrink-0" href="{% url 'app_home:index' %}">
                    <span class="brand-mark">C2</span>
                    <span>Catálogo</span>
                </a>
                <div class="position-relative mx-3 flex-grow-1 d-none d-lg-block" style="max-width: 400px;">
                    <div class="input-group">
                        <input type="text" id="product-search" class="form-control border-end-0" placeholder="Buscar productos..." autocomplete="off">
                        <span class="input-group-text bg-white"><i class="fas fa-search text-muted"></i></span>
                    </div>
                    <div id="search-results" class="position-absolute w-100 mt-1 d-none" style="z-index: 1050;"></div>
                </div>
                <button class="navbar-toggler ms-auto" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar" aria-controls="mainNavbar" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
            </div>
            <div class="collapse navbar-collapse" id="mainNavbar">
                <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-1">
                    <li class="nav-item"><a class="nav-link px-lg-2{% if request.resolver_match.url_name == 'quotation-build' %} active{% endif %}" href="{% url 'app_quotations:quotation-build' %}">Cotización</a></li>
                    <!-- <li class="nav-item"><a class="nav-link px-lg-2" href="{% url 'app_home:index' %}">Inicio</a></li> -->
                    <li class="nav-item"><a class="nav-link px-lg-2{% if request.resolver_match.url_name == 'about' %} active{% endif %}" href="{% url 'app_home:about' %}">Nosotros</a></li>
                    <li class="nav-item"><a class="nav-link px-lg-2{% if request.resolver_match.url_name == 'products' %} active{% endif %}" href="{% url 'app_home:products' %}">Productos</a></li>
                    <!-- <li class="nav-item"><a class="nav-link px-lg-2" href="{% url 'app_home:categories' %}">Categorías</a></li> -->
                    <!-- <li class="nav-item"><a class="nav-link px-lg-2" href="{% url 'app_home:brands' %}">Marcas</a></li>
                    <li class="nav-item"><a class="nav-link px-lg-2" href="{% url 'app_home:warranty' %}">Garantía</a></li> -->
                    <li class="nav-item"><a class="nav-link px-lg-2{% if request.resolver_match.url_name == 'contact' %} active{% endif %}" href="{% url 'app_home:contact' %}">Contacto</a></li>

                    {% if request.user.is_authenticated %}
                    <li class="nav-item">
                        <a class="btn btn-outline-primary btn-sm ms-lg-2" href="{% url 'app_users:perfil' %}">Perfil</a>
                    </li>
                    <li class="nav-item">
                        <a class="btn btn-danger btn-sm ms-lg-2" href="{% url 'app_users:logout' %}">Salir</a>
                    </li>
                    {% else %}
                    <li class="nav-item">
                        <a class="btn btn-outline-primary ms-lg-2" href="{% url 'app_users:login' %}">Ingresar</a>
                    </li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>
</header>

<style>
    #search-results .result-item:hover {
        background-color: #f0fdfa;
        cursor: pointer;
    }
    #search-results .result-item:not(:last-child) {
        border-bottom: 1px solid rgba(15, 23, 42, 0.08);
    }
</style>

<script>
document.addEventListener('DOMContentLoaded', function () {
    const input = document.getElementById('product-search');
    const container = document.getElementById('search-results');

    let searchTimeout;
    input.addEventListener('input', function () {
        clearTimeout(searchTimeout);
        const q = this.value.trim();
        if (q.length === 0) {
            container.classList.add('d-none');
            return;
        }
        searchTimeout = setTimeout(function () {
        fetch('/api/productos/?q=' + encodeURIComponent(q))
            .then(function (r) { return r.json(); })
            .then(function (data) {
                container.innerHTML = '';
                if (data.results.length === 0) {
                    container.innerHTML = '<div class="card shadow-sm border-0 p-3 text-muted text-center">No se encontraron productos</div>';
                } else {
                    var html = '<div class="card shadow-sm border-0">';
                    data.results.forEach(function (p) {
                        html += '<a href="/cotizacion/' + p.slug + '/" class="result-item p-3 d-flex align-items-center gap-3 text-decoration-none text-reset">'
                             + '<img src="' + p.image_main + '" alt="" style="width:50px;height:50px;object-fit:cover;border-radius:8px;" onerror="this.style.display=\'none\'">'
                             + '<div class="flex-grow-1"><div class="fw-semibold">' + p.name + '</div>'
                             + '<div class="small text-muted">' + p.category + ' — ' + p.brand + '</div></div>'
                             + '<div class="text-end"><div class="fw-bold">S/ ' + p.price + '</div>'
                             + '<div class="small ' + (p.stock > 0 ? 'text-success' : 'text-danger') + '">' + (p.stock > 0 ? 'Stock: ' + p.stock : 'Sin stock') + '</div></div>'
                             + '</a>';
                    });
                    html += '</div>';
                    container.innerHTML = html;
                }
                container.classList.remove('d-none');
            });
        }, 300);
    });

    document.addEventListener('click', function (e) {
        if (!input.contains(e.target) && !container.contains(e.target)) {
            container.classList.add('d-none');
        }
    });
});
</script>
