<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="{% block meta_description %}Catálogo administrativo de productos tecnológicos, marcas, categorías, garantía y contacto.{% endblock %}">
    <meta name="keywords" content="{% block meta_keywords %}catálogo tecnológico, administración, productos, marcas, categorías, garantía, contacto{% endblock %}">
    <meta name="robots" content="index,follow">
    <meta name="theme-color" content="#0f172a">
    <title>{% block title %}Catálogo 2026{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --web-primary: #0f766e;
            --web-primary-dark: #115e59;
            --web-accent: #ecfeff;
            --web-ink: #0f172a;
            --web-muted: #64748b;
            --web-border: rgba(15, 23, 42, 0.08);
        }

        body {
            font-family: 'Inter', sans-serif;
            color: var(--web-ink);
            background:
                radial-gradient(circle at top left, rgba(15, 118, 110, 0.08), transparent 28%),
                linear-gradient(180deg, #f8fafc 0%, #eef2f7 100%);
        }

        .btn-primary {
            --bs-btn-bg: var(--web-primary);
            --bs-btn-border-color: var(--web-primary);
            --bs-btn-hover-bg: var(--web-primary-dark);
            --bs-btn-hover-border-color: var(--web-primary-dark);
        }

        .btn-outline-primary {
            --bs-btn-color: var(--web-primary);
            --bs-btn-border-color: var(--web-primary);
            --bs-btn-hover-bg: var(--web-primary);
            --bs-btn-hover-border-color: var(--web-primary);
        }

        .hero-card {
            background:
                radial-gradient(circle at top left, rgba(255, 255, 255, 0.18), transparent 30%),
                linear-gradient(135deg, #0f172a 0%, #134e4a 58%, #0f766e 100%);
        }

        .brand-mark {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 2rem;
            height: 2rem;
            border-radius: 0.75rem;
            background: var(--web-accent);
            color: var(--web-primary);
            font-weight: 800;
        }

        .text-muted {
            color: var(--web-muted) !important;
        }

        .card {
            border-color: var(--web-border);
        }

        .section-kicker {
            letter-spacing: .14em;
            text-transform: uppercase;
            font-size: .78rem;
            font-weight: 700;
            color: var(--web-primary);
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body class="d-flex flex-column min-vh-100 bg-light">
    {% include 'include/header.html' %}

    <main class="flex-grow-1 py-4">
        <div class="container">
            {% if messages %}
                <div class="mb-3">
                    {% for message in messages %}
                        <div class="alert alert-{{ message.tags }} mb-2" role="alert">
                            {{ message }}
                        </div>
                    {% endfor %}
                </div>
            {% endif %}

            {% block content %}{% endblock %}
        </div>
    </main>

    {% include 'include/footer.html' %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
